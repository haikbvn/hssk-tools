name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "packaging/**"
      - "pyproject.toml"
      - ".github/workflows/build.yml"

jobs:
  lint:
    name: lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy

  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # GitHub-hosted Intel macOS runners are retired, so the Intel (x86_64) DMG is
        # cross-built on the arm64 runner under Rosetta: setup-python installs an x64
        # interpreter and PyInstaller (run via Rosetta) then emits an x86_64 app.
        include:
          - os: windows-latest
            label: windows
            py-arch: x64
          - os: macos-14          # Apple Silicon (arm64), native
            label: macos-arm64
            py-arch: arm64
          - os: macos-14          # Intel (x86_64), cross-built via Rosetta
            label: macos-intel
            py-arch: x64

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.py-arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Install Playwright Chromium (into bundle dir)
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
        run: python -m playwright install --no-shell chromium

      - name: Build app
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
        run: pyinstaller packaging/hssk_gui.spec

      - name: Get version
        id: ver
        shell: bash
        run: echo "version=$(python -c 'import hssk; print(hssk.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Build DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          bash packaging/make_dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.ver.outputs.version }} `
            packaging\hssk_gui.iss

      # Only upload when something will consume it: the release job (tag pushes) or a
      # manual run. PR builds still test + build above; uploading there just fills the
      # Actions artifact-storage quota.
      - uses: actions/upload-artifact@v7
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          name: hssk-gui-${{ matrix.label }}
          path: out/*
          retention-days: 14

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
