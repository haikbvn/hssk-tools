name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "packaging/**"
      - "pyproject.toml"
      - "constraints.txt"
      - ".github/workflows/build.yml"

jobs:
  lint:
    name: lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" -c constraints.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy

  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # GitHub-hosted Intel macOS runners are retired, so the Intel (x86_64) DMG is
        # cross-built on the arm64 runner under Rosetta. setup-python provides a
        # universal2 framework Python; prefixing every Python call with `arch -x86_64`
        # (matrix.pyrun) runs it in x86_64 mode, so pip pulls x86_64 wheels, Playwright
        # fetches the x86_64 Chromium, and PyInstaller emits an x86_64 app.
        include:
          - os: windows-latest
            label: windows
            pyrun: ""
          - os: macos-14          # Apple Silicon (arm64), native
            label: macos-arm64
            pyrun: ""
          - os: macos-14          # Intel (x86_64), cross-built via Rosetta
            label: macos-intel
            pyrun: "arch -x86_64"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: constraints.txt

      - name: Ensure Rosetta 2 (Intel cross-build)
        if: matrix.label == 'macos-intel'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Install dependencies
        run: |
          ${{ matrix.pyrun }} python -m pip install --upgrade pip
          ${{ matrix.pyrun }} python -m pip install -e ".[dev]" -c constraints.txt

      - name: Run tests
        run: ${{ matrix.pyrun }} python -m pytest -q

      # Cache the ~130 MB Chromium per platform/arch (matrix.label) and Playwright version
      # (pinned in constraints.txt). On a hit, the install step below verifies and skips the
      # download; on a miss it downloads and this cache saves it for next time.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/pw-browsers
          key: playwright-${{ matrix.label }}-${{ hashFiles('constraints.txt') }}

      - name: Install Playwright Chromium (into bundle dir)
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
        run: ${{ matrix.pyrun }} python -m playwright install --no-shell chromium

      - name: Build app
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
        run: ${{ matrix.pyrun }} python -m PyInstaller packaging/hssk_gui.spec

      - name: Get version
        id: ver
        shell: bash
        run: echo "version=$(${{ matrix.pyrun }} python -c 'import hssk; print(hssk.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Build DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          bash packaging/make_dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.ver.outputs.version }} `
            packaging\hssk_gui.iss

      # Only upload when something will consume it: the release job (tag pushes) or a
      # manual run. PR builds still test + build above; uploading there just fills the
      # Actions artifact-storage quota.
      - uses: actions/upload-artifact@v7
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          name: hssk-gui-${{ matrix.label }}
          path: out/*
          retention-days: 14

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
