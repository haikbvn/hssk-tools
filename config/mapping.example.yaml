# HSSK Tools — Excel → API field mapping
#
# Copy this to your active mapping (the app does it automatically on first run) and tweak the
# Excel column names on the LEFT to match your spreadsheet's header row. The `target` on the
# right is the API field name and must not be changed.
#
# Per-row values come from Excel. Everything under `defaults` is constant for every patient.

sheet: null # null = first sheet; otherwise the sheet name
header_row: 1 # 1-based row that holds the column headers

identifier:
  column: "Mã định danh" # the Excel column holding medicalIdentifierCode (drives patient search)

columns:
  # --- key + dates (-> medicalRecordInfo) ---
  "Mã định danh": { target: medicalIdentifierCode, type: str, required: true }
  # For `hssk update` only: uncomment the line below (and add the matching column to your Excel).
  # "Mã hồ sơ": { target: medicalRecordId, type: int, required: true }
  "Ngày khám":
    {
      target: examinationDate,
      type: datetime,
      out_format: "%d/%m/%Y %H:%M:%S",
      default_time: "07:00:00",
      required: true,
    }
  "Giờ kết thúc":
    {
      target: finishExaminationDate,
      type: datetime,
      out_format: "%d/%m/%Y %H:%M:%S",
      default_time: "08:00:00",
      required: true,
    }

  # --- exam meta (-> medicalRecordInfo) ---
  "Mã hình thức khám": { target: typeOfExamination, type: int, required: true }
  "Mã đối tượng khám": { target: reasonCode, type: int, required: true }
  "Lý do khám": { target: reasonsMedicalexamination, type: str }
  "Bệnh sử": { target: symptoms, type: str }

  # --- organ/system descriptions (-> medicalRecordInfo) ---
  "Da niêm mạc": { target: bodySkinDesc, type: str }
  "Toàn thân khác": { target: bodyOtherDesc, type: str }
  "Tim mạch": { target: heartDesc, type: str }
  "Hô hấp": { target: respiratoryDesc, type: str }
  "Tiêu hoá": { target: digestDesc, type: str }
  "Thận, tiết niệu": { target: urologyDesc, type: str }
  "Tâm thần - Thần kinh": { target: nerveDesc, type: str }
  "Cơ xương khớp": { target: osteoarthritisDesc, type: str }
  "Nội tiết": { target: endocrineDesc, type: str }
  "Bệnh máu": { target: bloodDesc, type: str }
  "Ngoại khoa": { target: surgeryDesc, type: str }
  "Sản phụ khoa": { target: maternityDesc, type: str }
  "Tai mũi họng": { target: earNoseThroatDesc, type: str }
  "Răng hàm mặt": { target: toothDesc, type: str }
  "Mắt": { target: eyeDesc, type: str }
  "Da liễu": { target: dermatologyDesc, type: str }
  "Dinh dưỡng": { target: nutritionDesc, type: str }
  "Vận động": { target: motionDesc, type: str }
  "Đánh giá phát triển thể chất": { target: physicalDesc, type: str }
  "Cơ quan khác": { target: organsOtherDesc, type: str }

  # --- diagnosis / treatment (-> medicalRecordInfo) ---
  "Chẩn đoán": { target: diagnosesDischarge, type: str, required: true }
  "Bệnh kèm theo": { target: diagnosesDischargeList, type: list }
  "Bệnh theo dõi": { target: noteDisease, type: str }
  "Tư vấn điều trị": { target: treatmentDirection, type: str }
  "Mã kết quả khám": { target: treatmentResultId, type: int, required: true }
  "Mã tình trạng ra viện":
    { target: dischargeStatusId, type: int, required: true }

  # --- doctor (-> medicalRecordInfo) ---
  "Bác sĩ": { target: doctorName, type: str, required: true }

  # --- vitals (-> medicalPatientDetailInfo) ---
  "Mạch": { target: pulse, type: int }
  "Nhiệt độ": { target: temperature, type: float }
  "HA tối đa": { target: bloodPressureMax, type: int }
  "HA tối thiểu": { target: bloodPressureMin, type: int }
  "Nhịp thở": { target: breath, type: int }
  "Cân nặng": { target: weight, type: str_num } # API sends weight/height/bmi as strings
  "Chiều cao": { target: height, type: str_num }
  "BMI": { target: bmi, type: str_num } # leave blank in Excel to auto-calculate
  "Vòng bụng": { target: waistCircumference, type: int }
  "Vòng ngực": { target: chestCircumference, type: int }
  "Mắt trái (kính)": { target: leftEyeGlasses, type: int }
  "Mắt trái (không kính)": { target: leftEyeNoGlasses, type: int }
  "Mắt phải (kính)": { target: rightEyeGlasses, type: int }
  "Mắt phải (không kính)": { target: rightEyeNoGlasses, type: int }

computed:
  bmi:
    from: [weight, height] # bmi = weight_kg / (height_m ** 2)
    only_if_missing: true # only compute when the BMI cell is blank
    round: 2

search:
  profileStatus: "1"
  page: 1
  size: 20
  multi_match: skip # skip | first | error  — what to do when >1 patient matches

defaults:
  normal_desc_value: "Bình thường" # fanned out to every *Desc organ field
  medicalRecordInfo:
    typeOfExamination: 100
    reasonCode: 93
    reasonsMedicalexamination: "Khám sức khoẻ"
    symptoms: "Không"
    treatmentDayNumber: "1"
    diagnosesDischarge: "0000 - Bình thường"
    diagnosesDischargeList: []
    noteDisease: "Không"
    treatmentDirection: "Bình thường"
    treatmentResultId: 3
    dischargeStatusId: 1
    # doctorName: leave blank to use the logged-in account's name; fill in to override.
    # healthfacilitiesId is always locked to the logged-in account and cannot be overridden.
    doctorName: ""
  medicalPatientDetailInfo: {}
